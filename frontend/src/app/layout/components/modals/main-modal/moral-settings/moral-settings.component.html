<ng-container *ngIf="isLoading$ | async; else content">
    <div class="settings-wrapper">
        <div class="settings-form">
            <h2><app-skeleton height="2rem" width="160px"></app-skeleton></h2>

            <div class="section">
                <h3>
                    <app-skeleton height="1.5rem" width="140px"></app-skeleton>
                </h3>

                <div class="form-group checkbox-group">
                    <app-skeleton height="1.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label>
                        <app-skeleton height="1rem" width="150px"></app-skeleton>
                    </label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group checkbox-group">
                    <app-skeleton height="1.5rem" width="100%"></app-skeleton>
                    <app-skeleton height="1.5rem" width="100%"></app-skeleton>
                    <app-skeleton height="1.5rem" width="100%"></app-skeleton>
                </div>
            </div>

            <div class="section">
                <h3>
                    <app-skeleton height="1.5rem" width="160px"></app-skeleton>
                </h3>

                <div class="form-group">
                    <label>
                        <app-skeleton height="1rem" width="120px"></app-skeleton>
                    </label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label>
                        <app-skeleton height="1rem" width="120px"></app-skeleton>
                    </label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>
            </div>

            <div class="section">
                <h3>
                    <app-skeleton height="1.5rem" width="160px"></app-skeleton>
                </h3>
                <div class="form-group">
                    <label>
                        <app-skeleton height="1rem" width="120px"></app-skeleton>
                    </label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label>
                        <app-skeleton height="1rem" width="120px"></app-skeleton>
                    </label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>
            </div>

            <div class="button-row">
                <app-skeleton height="2.5rem" width="180px"></app-skeleton>
            </div>
        </div>
    </div>
</ng-container>

<ng-template #content>
    <div class="settings-wrapper">
        <form [formGroup]="moralForm" (ngSubmit)="saveChanges()" class="settings-form">
            <h2>❤️ {{ "moralSettings.title" | translate }}</h2>

            <div class="section">
                <h3>{{ "settings.general" | translate }}</h3>

                <div class="form-group checkbox-group">
                    <label class="checkbox">
                        <input type="checkbox" formControlName="enabled" />
                        {{ "moralSettings.enablePipeline" | translate }}
                    </label>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox">
                        <input type="checkbox" formControlName="releaseAfterUse" />
                        {{ "settings.releaseAfterUse" | translate }}
                    </label>
                </div>

                <div class="form-group">
                    <label for="moralActiveProvider">{{ "settings.activeProvider" | translate }}</label>
                    <app-ui-select
                        id="moralActiveProvider"
                        formControlName="activeProvider"
                        [options]="activeProviderOptions"
                    ></app-ui-select>
                </div>

                <div class="form-group checkbox-group">
                    <label class="checkbox">
                        <input type="checkbox" formControlName="fallbackHeuristic" />
                        {{ "moralSettings.addHeuristicFallback" | translate }}
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" formControlName="fallbackOllama" />
                        {{ "moralSettings.addOllamaFallback" | translate }}
                    </label>
                    <label class="checkbox">
                        <input type="checkbox" formControlName="fallbackOpenrouter" />
                        {{ "moralSettings.addOpenrouterFallback" | translate }}
                    </label>
                </div>

                <p class="hint">
                    {{ "moralSettings.fallbackHint" | translate }}
                </p>

                <div class="form-group">
                    <label for="moralSystemPrompt">{{ "settings.systemPrompt" | translate }}</label>
                    <app-ui-textarea
                        id="moralSystemPrompt"
                        formControlName="systemPrompt"
                        height="300px"
                        [autoResize]="false"
                        [rows]="12"
                    ></app-ui-textarea>
                </div>
            </div>

            <div class="section" [formGroup]="providersForm" *ngIf="isOllamaActive">
                <h3>{{ "moralSettings.ollamaProvider" | translate }}</h3>
                <div formGroupName="ollama">
                    <div class="form-group">
                        <label for="moralOllamaModel">{{ "settings.textModel" | translate }}</label>
                        <app-ui-select
                            id="moralOllamaModel"
                            [options]="ollamaModelOptions"
                            formControlName="model"
                        ></app-ui-select>
                    </div>

                    <div class="form-group">
                        <label for="moralOllamaTemperature">{{ "settings.temperature" | translate }}</label>
                        <app-ui-input
                            id="moralOllamaTemperature"
                            type="number"
                            step="0.1"
                            min="0"
                            max="2"
                            formControlName="temperature"
                        ></app-ui-input>
                    </div>

                    <div class="form-group">
                        <label for="moralOllamaMaxTokens">{{ "settings.maxTokens" | translate }}</label>
                        <app-ui-input
                            id="moralOllamaMaxTokens"
                            type="number"
                            min="1"
                            max="2048"
                            formControlName="maxTokens"
                        ></app-ui-input>
                    </div>

                    <div class="form-group checkbox-group">
                        <label class="checkbox">
                            <input type="checkbox" formControlName="thinking" />
                            {{ "moralSettings.allowOllamaThinking" | translate }}
                        </label>
                    </div>
                </div>
            </div>

            <div class="section" [formGroup]="providersForm" *ngIf="isOpenrouterActive">
                <h3>{{ "moralSettings.openrouterProvider" | translate }}</h3>
                <div formGroupName="openrouter">
                    <div class="form-group">
                        <label for="moralOpenrouterKey">API Key</label>
                        <app-ui-input id="moralOpenrouterKey" type="password" formControlName="apiKey" ></app-ui-input>
                    </div>

                    <div class="form-group">
                        <label for="moralOpenrouterModel">{{ "settings.textModel" | translate }}</label>
                        <app-ui-input id="moralOpenrouterModel" type="text" formControlName="model" ></app-ui-input>
                    </div>

                    <div class="form-group">
                        <label for="moralOpenrouterTemp">{{ "settings.temperature" | translate }}</label>
                        <app-ui-input
                            id="moralOpenrouterTemp"
                            type="number"
                            step="0.1"
                            min="0"
                            max="2"
                            formControlName="temperature"
                        ></app-ui-input>
                    </div>

                    <div class="form-group">
                        <label for="moralOpenrouterTokens">{{ "settings.maxTokens" | translate }}</label>
                        <app-ui-input
                            id="moralOpenrouterTokens"
                            type="number"
                            min="1"
                            max="2048"
                            formControlName="maxTokens"
                        ></app-ui-input>
                    </div>
                </div>
            </div>

            <div class="button-row">
                <button type="submit" [disabled]="!hasChanges()">💾 {{ "moralSettings.save" | translate }}</button>
            </div>
        </form>
    </div>
</ng-template>
