<div class="settings-wrapper">
    <form
        [formGroup]="ragForm"
        (ngSubmit)="saveChanges()"
        class="settings-form"
    >
        <h2>🧠 RAG Settings</h2>

        <!-- Basic Settings -->
        <div class="section">
            <h3>Basic Configuration</h3>

            <div class="form-group">
                <label class="checkbox">
                    <input type="checkbox" formControlName="enabled" />
                    Enable RAG Processing
                </label>
            </div>

            <div class="form-group">
                <label for="embeddingModel">Embedding Model</label>
                <input
                    id="embeddingModel"
                    type="text"
                    formControlName="embeddingModel"
                    placeholder="all-MiniLM-L6-v2"
                />
            </div>

            <div class="form-group">
                <label for="vectorDbPath">Vector Database Path</label>
                <input
                    id="vectorDbPath"
                    type="text"
                    formControlName="vectorDbPath"
                    placeholder="./data/vector_db"
                />
            </div>

            <div class="form-group">
                <label for="chunkSize">Chunk Size</label>
                <input
                    id="chunkSize"
                    type="number"
                    formControlName="chunkSize"
                    min="100"
                    max="2000"
                    step="100"
                />
            </div>

            <div class="form-group">
                <label for="chunkOverlap">Chunk Overlap</label>
                <input
                    id="chunkOverlap"
                    type="number"
                    formControlName="chunkOverlap"
                    min="0"
                    max="500"
                    step="50"
                />
            </div>

            <div class="form-group">
                <label for="topK">Top K Results</label>
                <input
                    id="topK"
                    type="number"
                    formControlName="topK"
                    min="1"
                    max="20"
                />
            </div>

            <div class="form-group">
                <label for="similarityThreshold">Similarity Threshold</label>
                <input
                    id="similarityThreshold"
                    type="range"
                    formControlName="similarityThreshold"
                    min="0"
                    max="1"
                    step="0.01"
                />
                <span>{{
                    ragForm.get("similarityThreshold")?.value | number : "1.2-2"
                }}</span>
            </div>
        </div>

        <!-- Caching Settings -->
        <div class="section">
            <h3>Caching</h3>

            <div class="form-group">
                <label class="checkbox">
                    <input type="checkbox" formControlName="enableCaching" />
                    Enable Result Caching
                </label>
            </div>

            <div class="form-group">
                <label for="cacheTtl">Cache TTL (minutes)</label>
                <input
                    id="cacheTtl"
                    type="number"
                    formControlName="cacheTtl"
                    min="1"
                    max="1440"
                />
            </div>
        </div>

        <!-- Search Strategy -->
        <div class="section">
            <h3>Search Strategy</h3>

            <div class="subsection">
                <h4>Session Context</h4>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="sessionContextEnabled"
                        />
                        Enable Session Context Search
                    </label>
                </div>
                <div class="form-group">
                    <label for="sessionContextMaxMessages">Max Messages</label>
                    <input
                        id="sessionContextMaxMessages"
                        type="number"
                        formControlName="sessionContextMaxMessages"
                        min="1"
                        max="100"
                    />
                </div>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="sessionContextLookBackToToday"
                        />
                        Look Back to Today
                    </label>
                </div>
            </div>

            <div class="subsection">
                <h4>Daily Summary</h4>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="dailySummaryEnabled"
                        />
                        Enable Daily Summary Search
                    </label>
                </div>
                <div class="form-group">
                    <label for="dailySummaryLookBackDays">Look Back Days</label>
                    <input
                        id="dailySummaryLookBackDays"
                        type="number"
                        formControlName="dailySummaryLookBackDays"
                        min="1"
                        max="30"
                    />
                </div>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="dailySummaryUseTags"
                        />
                        Use Tags for Search
                    </label>
                </div>
            </div>

            <div class="subsection">
                <h4>Long Term Memory</h4>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="longTermMemoryEnabled"
                        />
                        Enable Long Term Memory
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="longTermMemoryVectorSearch"
                        />
                        Vector Search
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="longTermMemoryGraphSearch"
                        />
                        Graph Search
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="longTermMemoryPriorityRules"
                        />
                        Priority Rules
                    </label>
                </div>
            </div>

            <div class="subsection">
                <h4>Fallback</h4>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="fallbackAskUser"
                        />
                        Ask User for Clarification
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="fallbackAutoLearn"
                        />
                        Auto Learn from User Responses
                    </label>
                </div>
            </div>
        </div>

        <!-- Memory Settings -->
        <div class="section">
            <h3>Memory Configuration</h3>

            <div class="subsection">
                <h4>Facts Memory</h4>
                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" formControlName="factsEnabled" />
                        Enable Facts Memory
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="factsAutoUpdate"
                        />
                        Auto Update Facts
                    </label>
                </div>
            </div>

            <div class="subsection">
                <h4>Graph Memory</h4>
                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" formControlName="graphEnabled" />
                        Enable Graph Memory
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="graphRelationships"
                        />
                        Track Relationships
                    </label>
                </div>
                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="graphInference"
                        />
                        Enable Inference
                    </label>
                </div>
            </div>
        </div>

        <div class="button-row">
            <button type="submit" [disabled]="!hasChanges()">
                💾 Save RAG Settings
            </button>
        </div>
    </form>
</div>
