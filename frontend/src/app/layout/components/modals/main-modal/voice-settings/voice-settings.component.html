<div class="settings-wrapper">
    <!-- Скелетон, пока данные не загружены -->
    <ng-container *ngIf="isLoading$ | async; else formContent">
        <div class="settings-form">
            <h2><app-skeleton height="2rem" width="150px"></app-skeleton></h2>

            <!-- General Settings -->
            <div class="section">
                <h3>
                    <app-skeleton height="1.5rem" width="120px"></app-skeleton>
                </h3>

                <div class="form-group">
                    <app-skeleton height="1.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <app-skeleton height="1.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <app-skeleton height="1.5rem" width="100%"></app-skeleton>
                </div>
            </div>

            <!-- Audio Output -->
            <div class="section">
                <h3>
                    <app-skeleton height="1.5rem" width="120px"></app-skeleton>
                </h3>

                <div class="form-group">
                    <app-skeleton height="1.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>
            </div>

            <!-- Voice Configuration -->
            <div class="section">
                <h3>
                    <app-skeleton height="1.5rem" width="120px"></app-skeleton>
                </h3>

                <div class="form-group">
                    <label
                        ><app-skeleton height="1rem" width="80px"></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton height="1rem" width="80px"></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton height="1rem" width="80px"></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton height="1rem" width="80px"></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton height="1rem" width="80px"></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>
            </div>

            <!-- Processing -->
            <div class="section">
                <h3>
                    <app-skeleton height="1.5rem" width="120px"></app-skeleton>
                </h3>

                <div class="form-group">
                    <app-skeleton height="1.5rem" width="100%"></app-skeleton>
                </div>
            </div>

            <!-- Devices Refresh -->
            <div class="devices-toolbar">
                <span
                    ><app-skeleton height="1.2rem" width="100px"></app-skeleton
                ></span>
                <app-skeleton height="2.5rem" width="100px"></app-skeleton>
            </div>

            <!-- Action Buttons -->
            <div class="button-row">
                <app-skeleton height="2.5rem" width="150px"></app-skeleton>
                <app-skeleton height="2.5rem" width="150px"></app-skeleton>
            </div>
        </div>
    </ng-container>

    <ng-template #formContent>
        <form
            [formGroup]="voiceForm"
            (ngSubmit)="saveChanges()"
            class="settings-form"
        >
            <h2>🎤 {{ "settings.voiceSettings" | translate }}</h2>

            <!-- General Settings -->
            <div class="section">
                <h3>🎛️ {{ "settings.generalSettings" | translate }}</h3>

                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" formControlName="enabled" />
                        {{ "settings.enableVoiceResponses" | translate }}
                    </label>
                </div>

                <div class="form-group">
                    <label for="activeModule">{{
                        "settings.activeVoiceModule" | translate
                    }}</label>
                    <select id="activeModule" formControlName="activeModule">
                        <option
                            *ngFor="let module of voiceModules"
                            [value]="module.value"
                            [disabled]="!module.available"
                            [title]="getModuleTooltip(module)"
                        >
                            {{ getModuleLabel(module) }}
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" formControlName="streamingTts" />
                        {{ "settings.streamingTts" | translate }}
                    </label>
                </div>

                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="enableFallback"
                        />
                        {{ "settings.enableFallback" | translate }}
                    </label>
                </div>
            </div>

            <!-- Audio Output -->
            <div class="section">
                <h3>🔊 {{ "settings.audioOutput" | translate }}</h3>

                <div class="form-group">
                    <label class="checkbox">
                        <input
                            type="checkbox"
                            formControlName="useWindowsOutput"
                        />
                        {{ "settings.useWindowsAudioOutput" | translate }}
                    </label>
                </div>

                <div class="form-group">
                    <label for="outputId">{{
                        "settings.audioOutputDevice" | translate
                    }}</label>
                    <select id="outputId" formControlName="outputId">
                        <ng-container *ngIf="devices$ | async as devices">
                            <option
                                *ngFor="let device of devices.audioOutputs"
                                [value]="device.id"
                            >
                                [{{ device.id }}]: {{ device.name }}
                            </option>
                        </ng-container>
                    </select>
                </div>

                <div class="form-group" *ngIf="showWindowsOutput()">
                    <label for="windowsOutputId">{{
                        "settings.windowsOutputDevice" | translate
                    }}</label>
                    <select
                        id="windowsOutputId"
                        formControlName="windowsOutputId"
                    >
                        <ng-container *ngIf="devices$ | async as devices">
                            <option
                                *ngFor="let device of devices.windowsOutputs"
                                [value]="device.id"
                            >
                                [{{ device.id }}]: {{ device.name }}
                            </option>
                        </ng-container>
                    </select>
                </div>
            </div>

            <!-- Voice Configuration -->
            <div class="section">
                <h3>🎤 {{ "settings.voiceConfiguration" | translate }}</h3>

                <!-- ElevenLabs Fields -->
                <div
                    *ngIf="showElevenLabsFields()"
                    formGroupName="voiceModules"
                >
                    <div formGroupName="elevenlabs">
                        <div class="form-group">
                            <label for="apiKey">{{
                                "settings.apiKey" | translate
                            }}</label>
                            <input
                                id="apiKey"
                                type="password"
                                formControlName="apiKey"
                                [placeholder]="
                                    'settings.enterApiKey' | translate
                                "
                            />
                        </div>

                        <div class="form-group">
                            <label for="voiceId">{{
                                "settings.voiceId" | translate
                            }}</label>
                            <input
                                id="voiceId"
                                type="text"
                                formControlName="voiceId"
                                [placeholder]="
                                    'settings.enterVoiceId' | translate
                                "
                            />
                        </div>

                        <div class="form-group">
                            <label for="modelId">{{
                                "settings.modelId" | translate
                            }}</label>
                            <input
                                id="modelId"
                                type="text"
                                formControlName="modelId"
                                [placeholder]="
                                    'settings.enterModelId' | translate
                                "
                            />
                        </div>

                        <div class="form-group">
                            <label for="stability">{{
                                "settings.stability" | translate
                            }}</label>
                            <input
                                id="stability"
                                type="number"
                                formControlName="stability"
                                min="0"
                                max="1"
                                step="0.01"
                                placeholder="0.5"
                            />
                        </div>

                        <div class="form-group">
                            <label for="similarity">{{
                                "settings.similarity" | translate
                            }}</label>
                            <input
                                id="similarity"
                                type="number"
                                formControlName="similarity"
                                min="0"
                                max="1"
                                step="0.01"
                                placeholder="0.75"
                            />
                        </div>
                    </div>
                </div>

                <!-- Edge Fields -->
                <div *ngIf="showVoiceLanguage()" formGroupName="voiceModules">
                    <div formGroupName="edge">
                        <div class="form-group">
                            <label for="voiceLanguage">{{
                                "settings.voiceLanguage" | translate
                            }}</label>
                            <ng-container
                                *ngIf="
                                    edgeVoices.length > 0;
                                    else voiceSkeleton
                                "
                            >
                                <select
                                    id="voiceLanguage"
                                    formControlName="voiceLanguage"
                                    class="voice-select"
                                >
                                    <option
                                        *ngFor="let voice of edgeVoices"
                                        [value]="voice.name"
                                    >
                                        {{ voice.name }}
                                    </option>
                                </select>
                            </ng-container>
                            <ng-template #voiceSkeleton>
                                <app-skeleton
                                    height="2.5rem"
                                    width="100%"
                                ></app-skeleton>
                            </ng-template>
                        </div>
                    </div>
                </div>

                <!-- gTTS Fields -->
                <div *ngIf="showGttsFields()" formGroupName="voiceModules">
                    <div formGroupName="gtts">
                        <div class="form-group">
                            <label for="gtts-language">{{
                                "settings.language" | translate
                            }}</label>
                            <input
                                id="gtts-language"
                                type="text"
                                formControlName="language"
                                placeholder="ru"
                            />
                        </div>

                        <div class="form-group">
                            <label for="gtts-tld">TLD</label>
                            <input
                                id="gtts-tld"
                                type="text"
                                formControlName="tld"
                                placeholder="com"
                            />
                        </div>

                        <div class="form-group">
                            <label class="checkbox">
                                <input
                                    type="checkbox"
                                    formControlName="slow"
                                />
                                Slow mode (gTTS)
                            </label>
                        </div>

                        <div class="form-group">
                            <label for="gtts-fallback">Fallback voice (pyttsx3)</label>
                            <input
                                id="gtts-fallback"
                                type="text"
                                formControlName="fallbackVoice"
                                placeholder="pyttsx3 voice id"
                            />
                        </div>
                    </div>
                </div>

                <!-- OpenAI Fields -->
                <div *ngIf="showOpenAIFields()">
                    <div class="form-group">
                        <label for="openai-apiKey">{{
                            "settings.apiKey" | translate
                        }}</label>
                        <input
                            id="openai-apiKey"
                            type="password"
                            [placeholder]="
                                'settings.enterOpenaiApiKey' | translate
                            "
                        />
                    </div>
                </div>
            </div>

            <!-- Processing -->
            <div class="section">
                <h3>🎛️ {{ "settings.processing" | translate }}</h3>

                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" formControlName="useRvc" />
                        {{ "settings.useRvcProcessing" | translate }}
                    </label>
                </div>
            </div>

            <!-- Devices Refresh -->
            <div class="devices-toolbar">
                <span class="devices-title">{{
                    "settings.audioDevices" | translate
                }}</span>
                <button
                    type="button"
                    class="refresh-button"
                    (click)="refreshDevices()"
                    [disabled]="devicesRefreshing"
                >
                    🔄
                    {{
                        devicesRefreshing
                            ? ("settings.refreshing" | translate)
                            : ("settings.refresh" | translate)
                    }}
                </button>
            </div>

            <!-- Action Buttons -->
            <div class="button-row">
                <button
                    type="button"
                    (click)="resetToDefaults()"
                    class="secondary-button"
                >
                    🔄 {{ "settings.resetToDefaults" | translate }}
                </button>
                <button
                    type="submit"
                    [disabled]="!hasChanges()"
                    class="primary-button"
                >
                    💾 {{ "general.saveVoiceSettings" | translate }}
                </button>
            </div>
        </form>
    </ng-template>
</div>
