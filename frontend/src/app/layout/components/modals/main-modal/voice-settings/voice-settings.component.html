<div class="settings-wrapper">
    <form
        [formGroup]="voiceForm"
        (ngSubmit)="saveChanges()"
        class="settings-form"
    >
        <h2>🎤 Voice Settings</h2>

        <div class="form-group">
            <label class="checkbox">
                <input type="checkbox" formControlName="enabled" />
                Enable Voice Responses
            </label>
        </div>

        <div class="form-group">
            <label for="voiceLanguage">Voice Language</label>
            <input
                id="voiceLanguage"
                type="text"
                formControlName="voiceLanguage"
                placeholder="ru-RU-SvetlanaNeural"
            />
        </div>

        <div class="form-group">
            <label for="language">Recognition Language</label>
            <input
                id="language"
                type="text"
                formControlName="language"
                placeholder="ru-RU"
            />
        </div>

        <div class="form-group">
            <label class="checkbox">
                <input type="checkbox" formControlName="useRvc" />
                Use RVC Processing
            </label>
        </div>

        <div class="form-group">
            <label class="checkbox">
                <input type="checkbox" formControlName="streamingTts" />
                Streaming TTS
            </label>
        </div>

        <div class="form-group">
            <label class="checkbox">
                <input type="checkbox" formControlName="useWindowsOutput" />
                Use Windows Audio Output
            </label>
        </div>

        <!-- Audio Output Devices -->
        <ng-container *ngIf="devices$ | async as devices">
            <div class="form-group">
                <label for="outputId">Audio Output Device</label>
                <select id="outputId" formControlName="outputId">
                    <option
                        *ngFor="let device of devices.audioOutputs"
                        [value]="device.id"
                    >
                        [{{ device.id }}]: {{ device.name }}
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label for="windowsOutputId">Windows Output Device</label>
                <select id="windowsOutputId" formControlName="windowsOutputId">
                    <option
                        *ngFor="let device of devices.windowsOutputs"
                        [value]="device.id"
                    >
                        [{{ device.id }}]: {{ device.name }}
                    </option>
                </select>
            </div>
        </ng-container>

        <div class="button-row">
            <button type="submit" [disabled]="!hasChanges()">
                💾 Save Voice Settings
            </button>
        </div>
    </form>
</div>
