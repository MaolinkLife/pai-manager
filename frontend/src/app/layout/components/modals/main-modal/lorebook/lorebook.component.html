<!-- lorebook.component.html -->
<ng-container *ngIf="entries$ | async as entries">
    <div class="entries-container">
        <div *ngFor="let entry of entries; let i = index" class="entry-block">
            <div class="entry-header">
                <input
                    [(ngModel)]="entry.category"
                    class="entry-category"
                    placeholder="Категория"
                    (blur)="updateEntry(entry)"
                />

                <div class="entry-toolbar">
                    <input
                        [(ngModel)]="entry.keywords"
                        class="entry-keywords"
                        placeholder="Ключевые слова (через пробел)"
                        (blur)="updateEntry(entry)"
                    />

                    <label class="active-toggle">
                        <input
                            type="checkbox"
                            [(ngModel)]="entry.active"
                            (change)="updateEntry(entry)"
                        />
                        Активна
                    </label>

                    <div class="icon delete-icon" (click)="clickDelete(entry)">
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            fill="none"
                            viewBox="0 0 24 24"
                            stroke="currentColor"
                        >
                            <path
                                stroke-linecap="round"
                                stroke-linejoin="round"
                                stroke-width="2"
                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7h6m2 0H7m4-3h2a1 1 0 011 1v1H8V5a1 1 0 011-1z"
                            />
                        </svg>
                    </div>
                </div>
            </div>
            <textarea
                [(ngModel)]="entry.content"
                class="entry-text"
                placeholder="Содержание знания..."
                (blur)="updateEntry(entry)"
            >
            </textarea>
        </div>
    </div>

    <div class="modal-footer">
        <div>
            <button class="accent-btn" (click)="addNewEntry()">
                ➕ Добавить запись
            </button>
        </div>
    </div>
</ng-container>
