<div class="settings-wrapper">
    <form
        [formGroup]="audioForm"
        (ngSubmit)="saveChanges()"
        class="settings-form"
    >
        <h2>🎙️ Audio Settings</h2>

        <!-- Input Device Selection -->
        <div class="section">
            <h3>Input Device</h3>

            <ng-container *ngIf="devices$ | async as devices">
                <div class="form-group">
                    <label for="inputDeviceId">Recording Device</label>
                    <select id="inputDeviceId" formControlName="inputDeviceId">
                        <option
                            *ngFor="let device of devices.inputDevices"
                            [value]="device.id"
                        >
                            [{{ device.id }}]: {{ device.name }}
                        </option>
                    </select>
                </div>
            </ng-container>
        </div>

        <!-- Audio Parameters -->
        <div class="section">
            <h3>Audio Parameters</h3>

            <div class="form-group">
                <label for="sampleRate">Sample Rate (Hz)</label>
                <input
                    id="sampleRate"
                    type="number"
                    formControlName="sampleRate"
                    min="8000"
                    max="48000"
                    step="1000"
                />
            </div>

            <div class="form-group">
                <label for="channels">Channels</label>
                <select id="channels" formControlName="channels">
                    <option value="1">Mono (1)</option>
                    <option value="2">Stereo (2)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="chunkSize">Chunk Size</label>
                <input
                    id="chunkSize"
                    type="number"
                    formControlName="chunkSize"
                    min="128"
                    max="4096"
                    step="128"
                />
            </div>
        </div>

        <!-- VAD Settings -->
        <div class="section">
            <h3>Voice Activity Detection</h3>

            <div class="form-group">
                <label class="checkbox">
                    <input type="checkbox" formControlName="enableVad" />
                    Enable Voice Activity Detection
                </label>
            </div>

            <div class="form-group">
                <label for="vadThreshold">VAD Threshold</label>
                <input
                    id="vadThreshold"
                    type="range"
                    formControlName="vadThreshold"
                    min="0"
                    max="1"
                    step="0.01"
                />
                <span>{{
                    audioForm.get("vadThreshold")?.value | number : "1.2-2"
                }}</span>
            </div>

            <div class="form-group">
                <label for="silenceTimeout">Silence Timeout (seconds)</label>
                <input
                    id="silenceTimeout"
                    type="number"
                    formControlName="silenceTimeout"
                    min="0.5"
                    max="10"
                    step="0.1"
                />
            </div>
        </div>

        <!-- Audio Length Limits -->
        <div class="section">
            <h3>Audio Length Limits</h3>

            <div class="form-group">
                <label for="minAudioLength"
                    >Minimum Audio Length (seconds)</label
                >
                <input
                    id="minAudioLength"
                    type="number"
                    formControlName="minAudioLength"
                    min="0.1"
                    max="5"
                    step="0.1"
                />
            </div>

            <div class="form-group">
                <label for="maxAudioLength"
                    >Maximum Audio Length (seconds)</label
                >
                <input
                    id="maxAudioLength"
                    type="number"
                    formControlName="maxAudioLength"
                    min="1"
                    max="120"
                    step="1"
                />
            </div>
        </div>

        <div class="button-row">
            <button type="submit" [disabled]="!hasChanges()">
                💾 Save Audio Settings
            </button>
        </div>
    </form>
</div>
