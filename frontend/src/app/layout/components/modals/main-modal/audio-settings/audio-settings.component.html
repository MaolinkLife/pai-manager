<div class="settings-wrapper">
    <ng-container *ngIf="isLoading$ | async; else formContent">
        <div class="settings-form">
            <h2><app-skeleton height="2rem" width="150px"></app-skeleton></h2>

            <div class="section">
                <h3>
                    <app-skeleton height="1.5rem" width="120px"></app-skeleton>
                </h3>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>
            </div>

            <div class="section">
                <h3>
                    <app-skeleton height="1.5rem" width="120px"></app-skeleton>
                </h3>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>
            </div>

            <div class="section">
                <h3>
                    <app-skeleton height="1.5rem" width="120px"></app-skeleton>
                </h3>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>
            </div>

            <div class="section">
                <h3>
                    <app-skeleton height="1.5rem" width="120px"></app-skeleton>
                </h3>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>

                <div class="form-group">
                    <label
                        ><app-skeleton
                            height="1rem"
                            width="120px"
                        ></app-skeleton
                    ></label>
                    <app-skeleton height="2.5rem" width="100%"></app-skeleton>
                </div>
            </div>

            <div class="button-row">
                <app-skeleton height="2.5rem" width="150px"></app-skeleton>
            </div>
        </div>
    </ng-container>

    <ng-template #formContent>
        <form
            [formGroup]="audioForm"
            (ngSubmit)="saveChanges()"
            class="settings-form"
        >
            <h2>🎙️ {{ "settings.audioSettings" | translate }}</h2>

            <!-- Input Device Selection -->
            <div class="section">
                <h3>{{ "settings.inputDevice" | translate }}</h3>

                <ng-container *ngIf="devices$ | async as devices">
                    <div class="form-group">
                        <label for="inputDeviceId">{{
                            "settings.recordingDevice" | translate
                        }}</label>
                        <select
                            id="inputDeviceId"
                            formControlName="inputDeviceId"
                        >
                            <option
                                *ngFor="let device of devices.inputDevices"
                                [value]="device.id"
                            >
                                [{{ device.id }}]: {{ device.name }}
                            </option>
                        </select>
                    </div>
                </ng-container>
            </div>

            <!-- Audio Parameters -->
            <div class="section">
                <h3>{{ "settings.audioParameters" | translate }}</h3>

                <div class="form-group">
                    <label for="sampleRate">{{
                        "settings.sampleRate" | translate
                    }}</label>
                    <input
                        id="sampleRate"
                        type="number"
                        formControlName="sampleRate"
                        min="8000"
                        max="48000"
                        step="1000"
                    />
                </div>

                <div class="form-group">
                    <label for="channels">{{
                        "settings.channels" | translate
                    }}</label>
                    <select id="channels" formControlName="channels">
                        <option value="1">
                            {{ "settings.mono" | translate }} (1)
                        </option>
                        <option value="2">
                            {{ "settings.stereo" | translate }} (2)
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="chunkSize">{{
                        "settings.chunkSize" | translate
                    }}</label>
                    <input
                        id="chunkSize"
                        type="number"
                        formControlName="chunkSize"
                        min="128"
                        max="4096"
                        step="128"
                    />
                </div>
            </div>

            <!-- VAD Settings -->
            <div class="section">
                <h3>{{ "settings.voiceActivityDetection" | translate }}</h3>

                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" formControlName="enableVad" />
                        {{
                            "settings.enableVoiceActivityDetection" | translate
                        }}
                    </label>
                </div>

                <div class="form-group">
                    <label for="vadThreshold">{{
                        "settings.vadThreshold" | translate
                    }}</label>
                    <input
                        id="vadThreshold"
                        type="range"
                        formControlName="vadThreshold"
                        min="0"
                        max="1"
                        step="0.01"
                    />
                    <span>{{
                        audioForm.get("vadThreshold")?.value | number : "1.2-2"
                    }}</span>
                </div>

                <div class="form-group">
                    <label for="silenceTimeout">{{
                        "settings.silenceTimeout" | translate
                    }}</label>
                    <input
                        id="silenceTimeout"
                        type="number"
                        formControlName="silenceTimeout"
                        min="0.5"
                        max="10"
                        step="0.1"
                    />
                </div>
            </div>

            <!-- Audio Length Limits -->
            <div class="section">
                <h3>{{ "settings.audioLengthLimits" | translate }}</h3>

                <div class="form-group">
                    <label for="minAudioLength">{{
                        "settings.minAudioLength" | translate
                    }}</label>
                    <input
                        id="minAudioLength"
                        type="number"
                        formControlName="minAudioLength"
                        min="0.1"
                        max="5"
                        step="0.1"
                    />
                </div>

                <div class="form-group">
                    <label for="maxAudioLength">{{
                        "settings.maxAudioLength" | translate
                    }}</label>
                    <input
                        id="maxAudioLength"
                        type="number"
                        formControlName="maxAudioLength"
                        min="1"
                        max="120"
                        step="1"
                    />
                </div>
            </div>

            <div class="button-row">
                <button type="submit" [disabled]="!hasChanges()">
                    💾 {{ "general.saveAudioSettings" | translate }}
                </button>
            </div>
        </form>
    </ng-template>
</div>
