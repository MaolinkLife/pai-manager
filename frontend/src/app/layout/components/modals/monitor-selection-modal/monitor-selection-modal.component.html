<section class="monitor-picker">
    <div class="monitor-picker__status" *ngIf="statusText || error">
        <span class="monitor-picker__status-dot" [class.monitor-picker__status-dot--error]="error"></span>
        <span>{{ error || statusText }}</span>
    </div>

    <ng-container *ngIf="monitors$ | async as monitors; else loadingState">
        <div class="monitor-picker__empty" *ngIf="!monitors.length && !error">
            No monitors found
        </div>

        <div class="monitor-grid" *ngIf="monitors.length">
            <button
                type="button"
                *ngFor="let monitor of monitors; let i = index; trackBy: trackByIndex"
                class="monitor-card"
                [class.monitor-card--selected]="i === selectedMonitor"
                (click)="selectMonitor(i)"
            >
                <div class="monitor-card__preview">
                    <img
                        *ngIf="monitor.preview; else noPreview"
                        [src]="'data:image/jpeg;base64,' + monitor.preview"
                        [alt]="'Monitor ' + i + ' preview'"
                        class="monitor-card__image"
                        (error)="onImageError(i, $event)"
                    />
                    <ng-template #noPreview>
                        <span class="monitor-card__no-preview">No preview</span>
                    </ng-template>
                </div>

                <div class="monitor-card__body">
                    <div class="monitor-card__title-row">
                        <span class="monitor-card__title">Monitor {{ monitor.index }}</span>
                        <span class="monitor-card__badge" *ngIf="i === selectedMonitor">Selected</span>
                    </div>
                    <div class="monitor-card__meta">
                        <span>{{ monitor.width }} x {{ monitor.height }}</span>
                        <span>{{ monitor.left }}, {{ monitor.top }}</span>
                    </div>
                </div>
            </button>
        </div>

        <footer class="monitor-picker__footer" *ngIf="monitors.length">
            <app-ui-button variant="secondary" (pressed)="close()">Cancel</app-ui-button>
            <app-ui-button (pressed)="confirmSelection()">Confirm Selection</app-ui-button>
        </footer>
    </ng-container>

    <ng-template #loadingState>
        <div class="monitor-picker__loading">Loading monitor previews...</div>
    </ng-template>
</section>
