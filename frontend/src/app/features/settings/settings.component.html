<div class="settings-wrapper">
    <form
        [formGroup]="settingsForm"
        (ngSubmit)="clickUpdateConfig()"
        class="settings-form"
    >
        <h2>⚙️ Персонаж</h2>
        <div class="form-group">
            <label for="charName">Имя персонажа</label>
            <input id="charName" type="text" formControlName="charName" />
        </div>

        <div class="form-group">
            <label for="userName">Имя пользователя</label>
            <input id="userName" type="text" formControlName="userName" />
        </div>

        <h2>🎤 Голос</h2>
        <div formGroupName="voice">
            <div class="form-group">
                <label for="voiceLanguage">Голосовой язык</label>
                <input
                    id="voiceLanguage"
                    type="text"
                    formControlName="voiceLanguage"
                />
            </div>

            <div class="form-group">
                <label for="language">Язык</label>
                <input id="language" type="text" formControlName="language" />
            </div>

            <div class="form-group">
                <label for="outputId">Output ID</label>
                <input id="outputId" type="number" formControlName="outputId" />
            </div>

            <div class="form-group">
                <label for="windowsOutputId">Windows Output ID</label>
                <input
                    id="windowsOutputId"
                    type="number"
                    formControlName="windowsOutputId"
                />
            </div>

            <div class="form-group">
                <label class="checkbox">
                    <input type="checkbox" formControlName="useRvc" />
                    Использовать RVC
                </label>
            </div>
        </div>

        <h2>🧩 Модули</h2>
        <div class="checkbox-grid" formGroupName="modules">
            <label
                ><input type="checkbox" formControlName="vtube_studio" /> VTube
                Studio</label
            >
            <label
                ><input type="checkbox" formControlName="whisper" />
                Whisper</label
            >
            <label
                ><input type="checkbox" formControlName="minecraft" />
                Minecraft</label
            >
            <label
                ><input type="checkbox" formControlName="gaming" />
                Gaming</label
            >
            <label
                ><input type="checkbox" formControlName="alarm" /> Alarm</label
            >
            <label
                ><input type="checkbox" formControlName="discord" />
                Discord</label
            >
            <label><input type="checkbox" formControlName="rag" /> RAG</label>
            <label
                ><input type="checkbox" formControlName="visual" />
                Visual</label
            >
        </div>

        <h2>🧠 API</h2>
        <div formGroupName="api">
            <div class="form-group">
                <label for="type">Тип</label>
                <input id="type" type="text" formControlName="type" />
            </div>

            <div class="form-group">
                <label for="model">Модель</label>
                <input id="model" type="text" formControlName="model" />
            </div>

            <div class="form-group">
                <label for="visualModel">Visual Model</label>
                <input
                    id="visualModel"
                    type="text"
                    formControlName="visualModel"
                />
            </div>

            <div class="form-group token-limit-block">
                <label for="tokenLimit">Token Limit</label>
                <input
                    #tokenInput
                    id="tokenLimit"
                    type="number"
                    min="512"
                    max="131072"
                    step="256"
                    formControlName="tokenLimit"
                />
                <input
                    #tokenSlider
                    type="range"
                    min="512"
                    max="131072"
                    step="256"
                    formControlName="tokenLimit"
                />

                <div class="token-range-labels">
                    <span>512</span>
                    <span>128k</span>
                </div>
            </div>

            <div class="form-group">
                <label for="messagePairLimit">Message Pair Limit</label>
                <input
                    id="messagePairLimit"
                    type="number"
                    formControlName="messagePairLimit"
                />
            </div>

            <label class="checkbox">
                <input type="checkbox" formControlName="streaming" />
                Streaming Mode
            </label>
        </div>

        <div class="button-row">
            <button type="submit" [disabled]="!hasChanges()">
                💾 Сохранить
            </button>
            <!-- <button class="cancel" type="button">Отмена</button> -->
        </div>
    </form>
</div>

<div class="settings-wrapper">
    <h2>🎨 Пресеты генерации</h2>
    <div class="form-group">
        <label for="presetSelect">Выбрать пресет</label>
        <select
            id="presetSelect"
            [(ngModel)]="selectedPresetName"
            (change)="applyPreset(selectedPresetName)"
        >
            <option *ngFor="let p of presets" [value]="p.name">
                {{ p.name }}
            </option>
        </select>
    </div>

    <form [formGroup]="generationSettingsForm">
        <div class="form-group">
            <label>Имя пресета</label>
            <input type="text" formControlName="name" />
        </div>
        <div class="form-group">
            <label>Описание</label>
            <input type="text" formControlName="description" />
        </div>

        <div class="form-group">
            <label
                >Temperature:
                <span>{{
                    generationSettingsForm.get("temperature")?.value
                }}</span></label
            >
            <input
                type="range"
                min="0.1"
                max="2.0"
                step="0.01"
                formControlName="temperature"
            />
        </div>

        <div class="form-group">
            <label
                >Top P:
                <span>{{
                    generationSettingsForm.get("top_p")?.value
                }}</span></label
            >
            <input
                type="range"
                min="0.1"
                max="1.0"
                step="0.01"
                formControlName="top_p"
            />
        </div>

        <div class="form-group">
            <label
                >Top K:
                <span>{{
                    generationSettingsForm.get("top_k")?.value
                }}</span></label
            >
            <input
                type="range"
                min="1"
                max="100"
                step="1"
                formControlName="top_k"
            />
        </div>

        <div class="form-group">
            <label
                >Min P:
                <span>{{
                    generationSettingsForm.get("min_p")?.value
                }}</span></label
            >
            <input
                type="range"
                min="0.0"
                max="1.0"
                step="0.01"
                formControlName="min_p"
            />
        </div>

        <div class="form-group">
            <label
                >Repeat Penalty:
                <span>{{
                    generationSettingsForm.get("repeat_penalty")?.value
                }}</span></label
            >
            <input
                type="range"
                min="0.5"
                max="2.0"
                step="0.01"
                formControlName="repeat_penalty"
            />
        </div>

        <div class="form-group">
            <label
                >Max Tokens:
                <span>{{
                    generationSettingsForm.get("num_predict")?.value
                }}</span></label
            >
            <input
                type="range"
                min="64"
                max="4096"
                step="64"
                formControlName="num_predict"
            />
        </div>

        <div class="form-group">
            <label>Стоп-токены</label>
            <textarea formControlName="stop"></textarea>
        </div>

        <div class="button-row">
            <button type="button" (click)="saveOrUpdatePreset()">
                💾 Сохранить пресет
            </button>
        </div>
    </form>
</div>
