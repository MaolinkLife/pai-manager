<div class="chat-container">
    <div class="messages">
        <div
            class="message"
            *ngFor="let msg of chatHistory"
            [ngClass]="msg.role"
        >
            <div class="timestamp">
                {{ formatTimestamp(msg.timestamp) }}
            </div>

            <div class="sender" *ngIf="msg.role === 'user'">Ты:</div>
            <div class="sender" *ngIf="msg.role === 'assistant'">Лим:</div>

            <markdown [data]="msg.content"></markdown>
        </div>

        <div *ngIf="loading" class="message assistant">
            <div class="sender">Лим:</div>
            Печатаю...
        </div>
    </div>

    <form (submit)="sendMessage()" class="input-area">
        <input
            type="text"
            [formControl]="chatInput"
            class="chat-input"
            placeholder="Скажи что-нибудь..."
        />
        <button type="submit">➤</button>
    </form>
</div>
