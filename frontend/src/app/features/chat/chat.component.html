<div class="chat-container">
    <div class="messages">
        <div
            class="message"
            *ngFor="let msg of chatHistory"
            [ngClass]="msg.role"
        >
            <strong *ngIf="msg.role === 'user'">Ты:</strong>
            <strong *ngIf="msg.role === 'assistant'">Лим:</strong>
            {{ msg.content }}
        </div>
        <div *ngIf="loading" class="message assistant">Печатаю...</div>
    </div>

    <form (submit)="sendMessage()" class="input-area">
        <input
            type="text"
            [formControl]="chatInput"
            class="chat-input"
            placeholder="Скажи что-нибудь..."
        />
        <button type="submit">➤</button>
    </form>
</div>
