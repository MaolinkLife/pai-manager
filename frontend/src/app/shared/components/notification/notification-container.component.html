<div class="notification notification--{{ data.type }}" [@slideIn] [@fadeOut]>
    <div class="notification-icon">
        <ng-container *ngIf="data.type === 'success'">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <circle cx="12" cy="12" r="10" />
                <path d="M9 12l2 2 4-4" />
            </svg>
        </ng-container>
        <ng-container *ngIf="data.type === 'error'">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <circle cx="12" cy="12" r="10" />
                <line x1="15" y1="9" x2="9" y2="15" />
                <line x1="9" y1="9" x2="15" y2="15" />
            </svg>
        </ng-container>
        <ng-container *ngIf="data.type === 'warning'">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <path
                    d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"
                />
                <line x1="12" y1="9" x2="12" y2="13" />
                <line x1="12" y1="17" x2="12" y2="17" />
            </svg>
        </ng-container>
        <ng-container *ngIf="data.type === 'info'">
            <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
            >
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="16" x2="12" y2="12" />
                <line x1="12" y1="8" x2="12.01" y2="8" />
            </svg>
        </ng-container>
    </div>

    <div class="notification-content">
        <div class="notification-title">{{ data.title || "Уведомление" }}</div>
        <div class="notification-message">
            <ng-container *ngIf="data.template; else textContent">
                <ng-template [ngTemplateOutlet]="data.template"></ng-template>
            </ng-container>
            <ng-template #textContent>
                {{ data.message }}
            </ng-template>
        </div>
    </div>

    <button class="close-btn" (click)="close()">
        <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
        >
            <path d="M6 18L18 6M6 6l12 12"></path>
        </svg>
    </button>
</div>
