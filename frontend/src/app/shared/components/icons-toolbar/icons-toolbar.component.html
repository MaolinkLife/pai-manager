<div class="icons-toolbar">
    <!-- Удалить -->
    <button
        class="btn-icon"
        (click)="deleteChange.emit({msg, chain: false })"
        title="Удалить"
    >
        <!-- 🗑 SVG -->
        <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7h6m2 0H7m4-3h2a1 1 0 011 1v1H8V5a1 1 0 011-1z"
            />
        </svg>
    </button>

    <!-- Удалить с ответом -->
    <button
        *ngIf="msg.role === 'user'"
        class="btn-icon"
        (click)="deleteChange.emit()"
        title="Удалить с ответом"
    >
        <!-- 💥 SVG -->
        <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
        >
            <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M12 8v4l3 3m5-3a9 9 0 11-9-9"
            />
        </svg>
    </button>

    <!-- Реролл -->
    <button
        *ngIf="msg.role === 'assistant' && index === lastIndex"
        class="btn-icon"
        (click)="rerollChange.emit(msg)"
        title="Реролл"
    >
        <!-- 🔄 SVG -->
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
            <path d="M3 3v5h5"></path>
            <path
                d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"
            ></path>
            <path d="M16 16h5v5"></path>
        </svg>
    </button>

    <!-- Озвучить -->
    <button
        *ngIf="msg.role === 'assistant'"
        class="btn-icon"
        (click)="playVoiceChange.emit(msg)"
        title="Прослушать"
    >
        <!-- 🔊 SVG -->
        <svg
            xmlns="http://www.w3.org/2000/svg"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
        >
            <path
                d="M11 4.702a.705.705 0 0 0-1.203-.498L6.413 7.587A1.4 1.4 0 0 1 5.416 8H3a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h2.416a1.4 1.4 0 0 1 .997.413l3.383 3.384A.705.705 0 0 0 11 19.298z"
            ></path>
            <path d="M16 9a5 5 0 0 1 0 6"></path>
            <path d="M19.364 18.364a9 9 0 0 0 0-12.728"></path>
        </svg>
    </button>
</div>
